<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Newsletter Reader</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=20260624">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260624">
<link rel="manifest" href="manifest.json?v=20260624">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Newsletter">
<meta name="theme-color" content="#fbfaf7">
<style>
  :root {
    --accent: #3a6b5c;
    --accent-soft: #e6efec;
    --border: #e2e0db;
    --text-sub: #8a8680;
    --bg: #fbfaf7;
    --surface: #ffffff;
    --text: #2b2a28;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, "Hiragino Sans", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- Top bar ---------- */
  #topbar {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #topbar h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.02em;
  }
  #topbar .right { display: flex; gap: 8px; align-items: center; }

  button {
    font-family: inherit;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text);
  }
  .icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    font-size: 18px;
  }
  .icon-btn:active { background: var(--accent-soft); }

  #syncStatus {
    font-size: 11px;
    color: var(--text-sub);
    white-space: nowrap;
  }

  /* ---------- Filter tabs ---------- */
  #tabs {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    overflow-x: auto;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: none;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-sub);
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ---------- List ---------- */
  #list {
    height: calc(100vh - 52px - 49px);
    overflow-y: auto;
    padding: 10px 14px 80px;
  }
  .empty {
    text-align: center;
    color: var(--text-sub);
    margin-top: 60px;
    font-size: 14px;
    line-height: 1.8;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
  }
  .card-snippet {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.6;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    color: #fff;
  }
  .badge.unread { background: #b0aca3; }
  .badge.reading { background: #c98a3d; }
  .badge.read { background: #6f9c87; }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
  }

  .star-btn {
    font-size: 18px;
    line-height: 1;
    color: var(--border);
    flex: none;
  }
  .star-btn.active { color: #d8a23a; }

  .del-btn {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 12px;
    color: var(--text-sub);
    padding: 4px 8px;
  }

  /* ---------- FAB ---------- */
  #fab {
    position: fixed;
    bottom: 22px;
    right: 22px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }

  /* ---------- Modal (add) ---------- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    align-items: flex-end;
    z-index: 50;
  }
  .overlay.show { display: flex; }
  .sheet {
    background: var(--surface);
    width: 100%;
    border-radius: 16px 16px 0 0;
    padding: 18px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
  }
  .sheet h2 { margin: 0 0 12px; font-size: 16px; }
  .sheet input, .sheet textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 10px;
    background: var(--bg);
    color: var(--text);
  }
  .sheet textarea {
    flex: 1;
    min-height: 35vh;
    resize: vertical;
    line-height: 1.7;
  }
  .sheet-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { color: var(--text-sub); }

  /* ---------- Reader ---------- */
  #reader {
    position: fixed; inset: 0;
    background: var(--reader-bg, #fff);
    color: var(--reader-fg, #2b2a28);
    display: none;
    flex-direction: column;
    z-index: 40;
  }
  #reader.show { display: flex; }
  #reader-bar {
    height: 50px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 10px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    flex: none;
  }
  #reader-bar .left, #reader-bar .right { display: flex; align-items: center; gap: 4px; }
  #reader-title {
    font-size: 13px;
    font-weight: 600;
    max-width: 38vw;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    opacity: 0.7;
  }
  #reader-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    min-height: 0;
  }
  #reader-content {
    max-width: 640px;
    margin: 0 auto;
    white-space: pre-wrap;
    line-height: 1.9;
    font-size: var(--reader-fontsize, 17px);
    font-family: var(--reader-fontfamily, -apple-system, "Hiragino Sans", sans-serif);
    word-break: break-word;
  }
  #reader-content.rich {
    white-space: normal;
  }
  #reader-content.rich * {
    max-width: 100%;
    font-family: inherit !important;
    color: inherit !important;
    background: transparent !important;
  }
  #reader-content.rich img,
  #reader-content.rich table {
    max-width: 100%;
    height: auto;
  }
  #reader-content.rich table {
    display: block;
    overflow-x: auto;
  }
  #reader-content.rich h1,
  #reader-content.rich h2,
  #reader-content.rich h3,
  #reader-content.rich h4 {
    font-weight: 700;
    line-height: 1.5;
    margin: 1.4em 0 0.6em;
  }
  #reader-content.rich h1 { font-size: 1.5em; }
  #reader-content.rich h2 { font-size: 1.3em; }
  #reader-content.rich h3 { font-size: 1.15em; }
  #reader-content.rich p {
    margin: 0 0 1em;
  }
  #reader-content.rich b,
  #reader-content.rich strong {
    font-weight: 700;
  }
  #reader-content.rich a {
    color: var(--accent);
    text-decoration: underline;
  }
  #reader-content.rich ul,
  #reader-content.rich ol {
    margin: 0 0 1em 1.4em;
  }
  #reader-content.rich hr {
    border: none;
    border-top: 1px solid currentColor;
    opacity: 0.2;
    margin: 1.6em 0;
  }
  #reader-content.rich blockquote {
    border-left: 3px solid currentColor;
    opacity: 0.85;
    padding-left: 1em;
    margin: 0 0 1em;
  }
  #reader-bottom {
    padding: 18px 24px 28px;
    text-align: center;
    color: var(--text-sub);
    font-size: 13px;
  }
  #scrollTopBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 18px;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    opacity: 0.85;
    z-index: 45;
  }
  #scrollTopBtn.show { display: flex; }
  #reader:not(.show) ~ #scrollTopBtn { display: none !important; }

  /* ---------- Settings sheet ---------- */
  .theme-row, .font-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .theme-swatch, .font-opt, .size-btn {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
  }
  .theme-swatch.active, .font-opt.active, .size-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .size-row { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 14px; }
  .size-row button {
    width: 40px; height: 40px;
    border: 1px solid var(--border);
    border-radius: 50%;
    font-size: 18px;
  }
  .settings-label {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 8px;
  }

  .bookmark-list {
    overflow-y: auto;
    max-height: 50vh;
    margin-bottom: 12px;
  }
  .bookmark-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
  }
  .bookmark-item:last-child { border-bottom: none; }
  .bookmark-main {
    flex: 1;
    text-align: left;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }
  .bookmark-snippet {
    color: var(--text-sub);
    font-size: 12px;
    margin-top: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .bookmark-del {
    font-size: 12px;
    color: var(--text-sub);
    padding: 4px 8px;
    flex: none;
  }
  .bookmark-empty {
    text-align: center;
    color: var(--text-sub);
    font-size: 13px;
    padding: 24px 0;
  }

  #loginGate{
    display:none;
    height:calc(100vh - 52px);
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    padding:24px;
  }
  #loginGate.show{display:flex;}
  #loginGate h2{margin-bottom:12px;}
  #loginGate button{
    background:#3a6b5c;color:#fff;padding:12px 20px;border-radius:8px;
  }

  /* ---------- AI Chat (AI MODULE - UI) ---------- */
  #ai-panel {
    border-top: 1px solid rgba(0,0,0,0.08);
    background: var(--reader-bg, #fff);
    flex: none;
    display: flex;
    flex-direction: column;
    max-height: 52vh;
  }
  #ai-panel-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    user-select: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  #ai-panel-toggle .ai-toggle-arrow {
    font-size: 11px;
    color: var(--text-sub);
    transition: transform 0.2s;
  }
  #ai-panel.open #ai-panel-toggle .ai-toggle-arrow {
    transform: rotate(180deg);
  }
  #ai-panel-body {
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #ai-panel.open #ai-panel-body {
    display: flex;
  }
  /* セクション選択行 */
  #ai-section-row {
    display: none; /* h2が存在する場合のみJS側でflexに切り替え */
    align-items: center;
    gap: 6px;
    padding: 0 12px 8px;
    overflow-x: auto;
    flex: none;
  }
  #ai-section-row::-webkit-scrollbar { display: none; }
  #ai-section-label {
    font-size: 11px;
    color: var(--text-sub);
    white-space: nowrap;
    flex: none;
  }
  .ai-section-btn {
    flex: none;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    border: 1px solid var(--border);
    color: var(--text-sub);
    background: none;
    white-space: nowrap;
    cursor: pointer;
    font-family: inherit;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ai-section-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
    font-weight: 600;
  }
  .ai-section-btn:active { background: var(--accent-soft); }

  /* ショートカットボタン行 */
  #ai-shortcuts {
    display: flex;
    gap: 6px;
    padding: 0 12px 10px;
    overflow-x: auto;
    flex: none;
  }
  #ai-shortcuts::-webkit-scrollbar { display: none; }
  .ai-shortcut-btn {
    flex: none;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: none;
    white-space: nowrap;
    cursor: pointer;
    font-family: inherit;
  }
  .ai-shortcut-btn:active { background: var(--accent-soft); }
  /* 会話履歴エリア */
  #ai-history {
    flex: 1;
    overflow-y: auto;
    padding: 0 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }
  .ai-bubble {
    max-width: 88%;
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .ai-bubble.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .ai-bubble.assistant {
    align-self: flex-start;
    background: var(--accent-soft);
    color: var(--text);
    border-bottom-left-radius: 3px;
  }
  .ai-bubble.thinking {
    align-self: flex-start;
    color: var(--text-sub);
    font-style: italic;
    background: none;
    padding-left: 0;
  }
  .ai-bubble.error {
    align-self: flex-start;
    background: #fdecea;
    color: #c0392b;
    border-bottom-left-radius: 3px;
  }
  /* 入力欄 */
  #ai-input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 8px 12px 12px;
    flex: none;
  }
  #ai-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    resize: none;
    max-height: 80px;
    line-height: 1.5;
    outline: none;
  }
  #ai-input:focus { border-color: var(--accent); }
  #ai-send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex: none;
    cursor: pointer;
    border: none;
  }
  #ai-send-btn:disabled { opacity: 0.4; cursor: default; }

</style>
</head>
<body>

<div id="topbar">
  <h1>Newsletter Reader</h1>
  <div class="right">
    <span id="syncStatus">未ログイン</span>
    <button class="icon-btn" id="signinBtn" title="Googleでログイン">⇄</button>
  </div>
</div>

<div id="tabs">
  <button class="tab active" data-filter="all">すべて</button>
  <button class="tab" data-filter="unread">未読</button>
  <button class="tab" data-filter="reading">読書中</button>
  <button class="tab" data-filter="read">完読</button>
  <button class="tab" data-filter="favorite">★お気に入り</button>
</div>

<div id="loginGate"><h2>Googleログインが必要です</h2><p>読みかけ位置・しおり・お気に入りを同期するため、ログインして利用してください。</p><button id="loginGateBtn">Googleでログイン</button></div>

<div id="list"></div>

<button id="fab">＋</button>

<!-- Add sheet -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <h2>メルマガを追加</h2>
    <input id="addTitle" type="text" placeholder="タイトル">
    <textarea id="addContent" placeholder="本文をここに貼り付け"></textarea>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="addCancel">キャンセル</button>
      <button class="btn btn-primary" id="addSave">保存</button>
    </div>
  </div>
</div>

<!-- Settings sheet -->
<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <h2>表示設定</h2>
    <div class="settings-label">テーマ</div>
    <div class="theme-row">
      <button class="theme-swatch" data-theme="light">ライト</button>
      <button class="theme-swatch" data-theme="sepia">セピア</button>
      <button class="theme-swatch" data-theme="dark">ダーク</button>
    </div>
    <div class="settings-label">フォント</div>
    <div class="font-row">
      <button class="font-opt" data-font="sans">ゴシック</button>
      <button class="font-opt" data-font="serif">明朝</button>
    </div>
    <div class="settings-label">文字サイズ</div>
    <div class="size-row">
      <button id="sizeDown">A−</button>
      <span id="sizeLabel">17px</span>
      <button id="sizeUp">A＋</button>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-primary" id="settingsClose">閉じる</button>
    </div>
  </div>
</div>

<!-- Bookmark list sheet -->
<div class="overlay" id="bookmarkOverlay">
  <div class="sheet">
    <h2>しおり一覧</h2>
    <div id="bookmarkList" class="bookmark-list"></div>
    <div class="sheet-actions">
      <button class="btn btn-primary" id="bookmarkListClose">閉じる</button>
    </div>
  </div>
</div>

<!-- Reader -->
<div id="reader">
  <div id="reader-bar">
    <div class="left">
      <button class="icon-btn" id="readerBack">←</button>
      <span id="reader-title"></span>
    </div>
    <div class="right">
      <button class="icon-btn" id="readerStar">☆</button>
      <button class="icon-btn" id="readerBookmark" title="この位置にしおりを挟む">🔖</button>
      <button class="icon-btn" id="readerBookmarkList" title="しおり一覧">📑</button>
      <button class="icon-btn" id="readerSettings">Aa</button>
      <button class="icon-btn" id="readerDone">✓</button>
    </div>
  </div>
  <div id="reader-body">
    <div id="reader-content"></div>
    <div id="reader-bottom"></div>
  </div>
  <!-- AI Chat Panel (AI MODULE - UI) -->
  <div id="ai-panel">
    <button id="ai-panel-toggle">
      <span>🤖 AIと話す</span>
      <span class="ai-toggle-arrow">▲</span>
    </button>
    <div id="ai-panel-body">
      <!-- セクション選択（h2が存在する記事のみ表示） -->
      <div id="ai-section-row">
        <span id="ai-section-label">対象：</span>
      </div>
      <!-- ショートカットボタン -->
      <div id="ai-shortcuts">
        <button class="ai-shortcut-btn" data-mode="要約">要約</button>
        <button class="ai-shortcut-btn" data-mode="論点">論点</button>
        <button class="ai-shortcut-btn" data-mode="疑問点">疑問点</button>
        <button class="ai-shortcut-btn" data-mode="反論">反論</button>
        <button class="ai-shortcut-btn" data-mode="応用">応用</button>
      </div>
      <!-- 会話履歴 -->
      <div id="ai-history"></div>
      <!-- 入力欄 -->
      <div id="ai-input-row">
        <textarea id="ai-input" placeholder="この記事について質問…" rows="1"></textarea>
        <button id="ai-send-btn" title="送信">↑</button>
      </div>
    </div>
  </div>
</div>
<button id="scrollTopBtn" title="冒頭に戻る">↑</button>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ============ CONFIG ============ */
const CLIENT_ID = "233081760785-oslo4tmmiuto6h56k4srnlbicsp6bnvs.apps.googleusercontent.com";
const SCOPE = "https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/gmail.readonly";
const DATA_FILENAME = "newsletter-data.json";
const GMAIL_QUERY = "label:メルマガ";

/* ============ STATE ============ */
let data = loadLocal() || { newsletters: [], settings: { theme: "light", font: "sans", fontSize: 17 }, importedIds: [] };
let accessToken = null;
let driveFileId = null;
let currentFilter = "all";
let openId = null;
let saveTimer = null;
let tokenClient = null;

/* ============ LOCAL STORAGE ============ */
function loadLocal() {
  try {
    const raw = localStorage.getItem("nl-data");
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function saveLocal() {
  localStorage.setItem("nl-data", JSON.stringify(data));
}

/* ============ UTIL ============ */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}


function isLoggedIn() {
  return !!accessToken;
}

function updateLoginUI() {
  const loggedIn = isLoggedIn();
  document.getElementById("loginGate").classList.toggle("show", !loggedIn);
  document.getElementById("tabs").style.display = loggedIn ? "flex" : "none";
  document.getElementById("list").style.display = loggedIn ? "block" : "none";
  document.getElementById("fab").style.display = loggedIn ? "flex" : "none";
}

/* ============ RENDER LIST ============ */
function render() {
  updateLoginUI();
  if (!isLoggedIn()) return;
  applySettings();
  const list = document.getElementById("list");
  let items = data.newsletters.slice().sort((a,b) => b.addedAt - a.addedAt);

  if (currentFilter === "unread") items = items.filter(n => n.status === "unread");
  else if (currentFilter === "reading") items = items.filter(n => n.status === "reading");
  else if (currentFilter === "read") items = items.filter(n => n.status === "read");
  else if (currentFilter === "favorite") items = items.filter(n => n.favorite);

  if (items.length === 0) {
    list.innerHTML = `<div class="empty">表示するメルマガがありません<br>右下の「＋」から追加してください</div>`;
    return;
  }

  list.innerHTML = items.map(n => {
    const snippet = n.content.replace(/\s+/g, " ").slice(0, 90);
    const progress = n.content.length ? Math.min(100, Math.round((n.pos / n.content.length) * 100)) : 0;
    const badgeLabel = { unread: "未読", reading: `読書中 ${progress}%`, read: "完読" }[n.status];
    return `
      <div class="card" data-id="${n.id}">
        <div class="card-top">
          <div class="card-title">${escapeHtml(n.title || "(無題)")}</div>
          <button class="star-btn ${n.favorite ? "active" : ""}" data-star="${n.id}">${n.favorite ? "★" : "☆"}</button>
        </div>
        <div class="card-snippet">${escapeHtml(snippet)}</div>
        <div class="card-meta">
          <span class="badge ${n.status}">${badgeLabel}</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${n.status === 'read' ? 100 : progress}%"></div></div>
        <button class="del-btn" data-del="${n.id}">削除</button>
      </div>`;
  }).join("");
}

/* ============ TABS ============ */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentFilter = tab.dataset.filter;
    render();
  });
});

/* ============ LIST INTERACTIONS ============ */
document.getElementById("list").addEventListener("click", e => {
  const star = e.target.closest("[data-star]");
  const del = e.target.closest("[data-del]");
  const card = e.target.closest(".card");

  if (star) {
    const n = data.newsletters.find(x => x.id === star.dataset.star);
    n.favorite = !n.favorite;
    persist();
    render();
    return;
  }
  if (del) {
    if (confirm("このメルマガを削除しますか？")) {
      data.newsletters = data.newsletters.filter(x => x.id !== del.dataset.del);
      persist();
      render();
    }
    return;
  }
  if (card) openReader(card.dataset.id);
});

/* ============ ADD SHEET ============ */
const addOverlay = document.getElementById("addOverlay");
document.getElementById("fab").addEventListener("click", () => {
  document.getElementById("addTitle").value = "";
  document.getElementById("addContent").value = "";
  addOverlay.classList.add("show");
});
document.getElementById("addCancel").addEventListener("click", () => addOverlay.classList.remove("show"));
document.getElementById("addSave").addEventListener("click", () => {
  const title = document.getElementById("addTitle").value.trim();
  const content = document.getElementById("addContent").value;
  if (!content.trim()) { alert("本文を入力してください"); return; }
  data.newsletters.push({
    id: uid(),
    title: title || "(無題)",
    content,
    status: "unread",
    favorite: false,
    pos: 0,
    bookmarks: [],
    addedAt: Date.now()
  });
  persist();
  render();
  addOverlay.classList.remove("show");
});

/* ============ READER ============ */
const reader = document.getElementById("reader");
const readerBody = document.getElementById("reader-body");
const readerContent = document.getElementById("reader-content");

function openReader(id) {
  const n = data.newsletters.find(x => x.id === id);
  if (!n) return;
  openId = id;
  document.getElementById("reader-title").textContent = n.title;
  if (n.html) {
    readerContent.innerHTML = n.html;
    readerContent.classList.add("rich");
  } else {
    readerContent.textContent = n.content;
    readerContent.classList.remove("rich");
  }
  document.getElementById("reader-bottom").textContent = "";
  document.getElementById("scrollTopBtn").classList.remove("show");
  reader.classList.add("show");
  updateStarIcon();

  if (n.status === "unread") {
    n.status = "reading";
    persist();
    render();
  }

  // AI MODULE: 記事ごとの会話履歴をパネルに復元（既存機能に影響なし）
  aiResetPanel(id);

  // restore scroll position (wait for images to finish loading so scrollHeight is accurate)
  const imgs = readerContent.querySelectorAll("img");
  let pending = imgs.length;
  function restoreScroll() {
    const max = readerBody.scrollHeight - readerBody.clientHeight;
    if (max > 0 && n.pos) {
      const frac = n.pos / n.content.length;
      readerBody.scrollTop = frac * max;
    }
    if (n.status === "read") {
      document.getElementById("reader-bottom").textContent = "ここまで読みました";
    }
  }
  if (pending === 0) {
    requestAnimationFrame(restoreScroll);
  } else {
    imgs.forEach(img => {
      if (img.complete) {
        pending--;
      } else {
        img.addEventListener("load", () => { pending--; if (pending === 0) requestAnimationFrame(restoreScroll); });
        img.addEventListener("error", () => { pending--; if (pending === 0) requestAnimationFrame(restoreScroll); });
      }
    });
    if (pending === 0) requestAnimationFrame(restoreScroll);
    // safety fallback in case some image never fires load/error
    setTimeout(restoreScroll, 1500);
  }
}

function closeReader() {
  reader.classList.remove("show");
  document.getElementById("scrollTopBtn").classList.remove("show");
  openId = null;
  render();
}
document.getElementById("readerBack").addEventListener("click", closeReader);

readerBody.addEventListener("scroll", () => {
  if (!openId) return;
  const n = data.newsletters.find(x => x.id === openId);
  if (!n) return;
  const max = readerBody.scrollHeight - readerBody.clientHeight;
  const frac = max > 0 ? readerBody.scrollTop / max : 1;
  n.pos = Math.round(frac * n.content.length);
  if (frac > 0.97 && n.status !== "read") {
    n.status = "read";
    document.getElementById("reader-bottom").textContent = "ここまで読みました";
  }
  document.getElementById("scrollTopBtn").classList.toggle("show", readerBody.scrollTop > 200);
  debouncedPersist();
});

document.getElementById("scrollTopBtn").addEventListener("click", () => {
  readerBody.scrollTo({ top: 0, behavior: "smooth" });
});

document.getElementById("readerStar").addEventListener("click", () => {
  const n = data.newsletters.find(x => x.id === openId);
  n.favorite = !n.favorite;
  updateStarIcon();
  persist();
});
function updateStarIcon() {
  const n = data.newsletters.find(x => x.id === openId);
  document.getElementById("readerStar").textContent = n.favorite ? "★" : "☆";
}

document.getElementById("readerDone").addEventListener("click", () => {
  const n = data.newsletters.find(x => x.id === openId);
  n.status = "read";
  persist();
  closeReader();
});

/* ============ BOOKMARKS ============ */
const bookmarkOverlay = document.getElementById("bookmarkOverlay");

document.getElementById("readerBookmark").addEventListener("click", () => {
  const n = data.newsletters.find(x => x.id === openId);
  if (!n) return;
  if (!n.bookmarks) n.bookmarks = [];

  const max = readerBody.scrollHeight - readerBody.clientHeight;
  const frac = max > 0 ? readerBody.scrollTop / max : 0;
  const pos = Math.round(frac * n.content.length);

  // snippet: grab surrounding plain text for context in the list
  const snippet = n.content.slice(pos, pos + 60).replace(/\s+/g, " ").trim();

  n.bookmarks.push({
    id: uid(),
    pos,
    scrollFrac: frac,
    snippet,
    createdAt: Date.now()
  });
  persist();

  const btn = document.getElementById("readerBookmark");
  const original = btn.textContent;
  btn.textContent = "✓";
  setTimeout(() => { btn.textContent = original; }, 800);
});

document.getElementById("readerBookmarkList").addEventListener("click", () => {
  renderBookmarkList();
  bookmarkOverlay.classList.add("show");
});
document.getElementById("bookmarkListClose").addEventListener("click", () => bookmarkOverlay.classList.remove("show"));

function renderBookmarkList() {
  const n = data.newsletters.find(x => x.id === openId);
  const list = document.getElementById("bookmarkList");
  if (!n || !n.bookmarks || n.bookmarks.length === 0) {
    list.innerHTML = `<div class="bookmark-empty">しおりはまだありません</div>`;
    return;
  }
  const sorted = n.bookmarks.slice().sort((a, b) => a.pos - b.pos);
  list.innerHTML = sorted.map(b => {
    const d = new Date(b.createdAt);
    const dateLabel = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    return `
      <div class="bookmark-item" data-bid="${b.id}">
        <button class="bookmark-main" data-jump="${b.id}">
          <div>${dateLabel}</div>
          <div class="bookmark-snippet">${escapeHtml(b.snippet || "")}…</div>
        </button>
        <button class="bookmark-del" data-bdel="${b.id}">削除</button>
      </div>`;
  }).join("");
}

document.getElementById("bookmarkList").addEventListener("click", e => {
  const jump = e.target.closest("[data-jump]");
  const del = e.target.closest("[data-bdel]");
  const n = data.newsletters.find(x => x.id === openId);
  if (!n || !n.bookmarks) return;

  if (jump) {
    const b = n.bookmarks.find(x => x.id === jump.dataset.jump);
    if (b) {
      const max = readerBody.scrollHeight - readerBody.clientHeight;
      readerBody.scrollTo({ top: b.scrollFrac * max, behavior: "smooth" });
    }
    bookmarkOverlay.classList.remove("show");
    return;
  }
  if (del) {
    n.bookmarks = n.bookmarks.filter(x => x.id !== del.dataset.bdel);
    persist();
    renderBookmarkList();
  }
});

function applySettings() {
  const s = data.settings;
  const themes = {
    light: { bg: "#fdfcf9", fg: "#2b2a28" },
    sepia: { bg: "#f3ead9", fg: "#5b4636" },
    dark:  { bg: "#1c1c1c", fg: "#e6e4df" }
  };
  const t = themes[s.theme] || themes.light;
  document.documentElement.style.setProperty("--reader-bg", t.bg);
  document.documentElement.style.setProperty("--reader-fg", t.fg);
  document.documentElement.style.setProperty("--reader-fontsize", s.fontSize + "px");
  document.documentElement.style.setProperty("--reader-fontfamily",
    s.font === "serif" ? "'Hiragino Mincho ProN', serif" : "-apple-system, 'Hiragino Sans', sans-serif");

  document.querySelectorAll(".theme-swatch").forEach(b => b.classList.toggle("active", b.dataset.theme === s.theme));
  document.querySelectorAll(".font-opt").forEach(b => b.classList.toggle("active", b.dataset.font === s.font));
  document.getElementById("sizeLabel").textContent = s.fontSize + "px";
}

/* ============ PERSISTENCE ============ */
function persist() {
  saveLocal();
  debouncedDriveSave();
}
function debouncedPersist() {
  saveLocal();
  debouncedDriveSave();
}
function debouncedDriveSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToDrive, 1500);
}

/* ============ GOOGLE AUTH & DRIVE ============ */
window.addEventListener("load", () => {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: (resp) => {
      if (resp.access_token) {
        accessToken = resp.access_token;
        updateLoginUI();
        const expiresAt = Date.now() + (Number(resp.expires_in) || 3600) * 1000;
        localStorage.setItem("nl-token", JSON.stringify({ token: accessToken, expiresAt }));
        document.getElementById("syncStatus").textContent = "同期中…";
        loadFromDrive();
        scheduleSilentRefresh(expiresAt);
      } else {
        // silent refresh failed (e.g. consent required) -> fall back to manual login state
        document.getElementById("syncStatus").textContent = "未ログイン";
        updateLoginUI();
      }
    }
  });

  // try to restore a still-valid token from a previous session
  try {
    const saved = JSON.parse(localStorage.getItem("nl-token") || "null");
    if (saved && saved.token) {
      if (saved.expiresAt > Date.now() + 60000) {
        accessToken = saved.token;
        updateLoginUI();
        document.getElementById("syncStatus").textContent = "同期中…";
        loadFromDrive();
        scheduleSilentRefresh(saved.expiresAt);
      } else {
        // token expired while app was closed -> try silent refresh immediately
        trySilentRefresh();
      }
    }
  } catch (e) {}
});

function scheduleSilentRefresh(expiresAt) {
  // refresh 5 minutes before expiry
  const delay = Math.max(5000, expiresAt - Date.now() - 5 * 60 * 1000);
  setTimeout(trySilentRefresh, delay);
}

function trySilentRefresh() {
  if (!tokenClient) return;
  try {
    tokenClient.requestAccessToken({ prompt: "" });
  } catch (e) {
    console.error(e);
  }
}

document.getElementById("signinBtn").addEventListener("click", () => { tokenClient.requestAccessToken(); });
document.getElementById("loginGateBtn").addEventListener("click", () => { tokenClient.requestAccessToken(); });

async function driveFetch(url, opts = {}) {
  opts.headers = Object.assign({}, opts.headers, { Authorization: "Bearer " + accessToken });
  return fetch(url, opts);
}

async function findDataFile() {
  const res = await driveFetch(
    "https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='" + DATA_FILENAME + "'&fields=files(id,modifiedTime)"
  );
  const json = await res.json();
  return (json.files && json.files[0]) || null;
}

async function loadFromDrive() {
  try {
    const file = await findDataFile();
    if (file) {
      driveFileId = file.id;
      const res = await driveFetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media");
      const remote = await res.json();
      // merge: prefer remote if it has more newsletters or local is empty
      if (!data.newsletters.length || (remote.newsletters && remote.newsletters.length >= data.newsletters.length)) {
        data = remote;
      }
      if (!data.importedIds) data.importedIds = [];
      saveLocal();
      render();
      document.getElementById("syncStatus").textContent = "同期済み";
    } else {
      // no remote file yet -> create from current local data
      await saveToDrive(true);
      document.getElementById("syncStatus").textContent = "同期済み";
    }
  } catch (e) {
    console.error(e);
    document.getElementById("syncStatus").textContent = "再ログインが必要です";
    localStorage.removeItem("nl-token");
  }
  checkGmail();
}

async function saveToDrive(forceCreate) {
  if (!accessToken) return;
  try {
    const content = JSON.stringify(data);
    if (!driveFileId && !forceCreate) {
      const file = await findDataFile();
      if (file) driveFileId = file.id;
    }
    if (driveFileId) {
      await driveFetch("https://www.googleapis.com/upload/drive/v3/files/" + driveFileId + "?uploadType=media", {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: content
      });
    } else {
      const metadata = { name: DATA_FILENAME, parents: ["appDataFolder"] };
      const form = new FormData();
      form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
      form.append("file", new Blob([content], { type: "application/json" }));
      const res = await driveFetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
        method: "POST",
        body: form
      });
      const json = await res.json();
      driveFileId = json.id;
    }
    document.getElementById("syncStatus").textContent = "同期済み";
  } catch (e) {
    console.error(e);
    document.getElementById("syncStatus").textContent = "同期エラー";
  }
}

/* ============ AI MODULE ============ */
// 会話履歴は記事ごとに localStorage のキー "nl-ai-chat:{記事ID}" で管理。
// Drive同期には含まない。
// サーバーエンドポイント: AI_API_URL の /api/ai へ POST。
// セクション分割: 記事HTMLの<h2>タグを区切りとして検出し、
// 選択セクションの本文のみをAIに送る。h2が存在しない記事は全文モード。

/* --- AI Storage --- */

const AI_API_URL = "https://broad-scene-f489.tackro-i.workers.dev";

// 記事IDに紐づいた会話履歴を取得（なければ空配列）
function aiLoadHistory(articleId) {
  try {
    const raw = localStorage.getItem("nl-ai-chat:" + articleId);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

// 会話履歴を保存
function aiSaveHistory(articleId, history) {
  try {
    localStorage.setItem("nl-ai-chat:" + articleId, JSON.stringify(history));
  } catch (e) { console.error("AI履歴保存エラー:", e); }
}

// 会話履歴をクリア
function aiClearHistory(articleId) {
  localStorage.removeItem("nl-ai-chat:" + articleId);
}

/* --- AI API --- */

// サーバー側 /api/ai へPOST。
// body: { mode?, title, content, question?, history }
// contentには選択セクションのプレーンテキストを渡す（全文 or セクション本文）。
async function aiCallApi({ mode, question, title, content, history }) {
  const res = await fetch(AI_API_URL + "/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ mode, title, content, question, history }),
  });
  if (!res.ok) {
    let msg = "サーバーエラー（" + res.status + "）";
    try { const j = await res.json(); msg = j.error || msg; } catch {}
    throw new Error(msg);
  }
  const json = await res.json();
  return json.reply;
}

/* --- AI UI --- */

let aiPanelOpen = false;

// 現在選択中のセクションインデックス（-1 = 全文）
let aiCurrentSection = -1;

// 記事のセクション情報: [{ heading, content }]
// heading: h2のテキスト、content: そのセクションのプレーンテキスト
let aiSections = [];

// 記事HTMLから<h2>を区切りとしてセクション分割する
// h2より前の本文は「全文」に含めるが個別セクションとしては扱わない
function aiParseSection(n) {
  // htmlがない場合はセクション分割不可 → 空配列を返す
  if (!n.html) return [];

  const doc = new DOMParser().parseFromString(n.html, "text/html");
  const body = doc.body;
  const sections = [];
  let currentHeading = null;
  let currentNodes = [];

  function flushSection() {
    if (!currentHeading) return; // h2前の本文はスキップ
    const text = currentNodes
      .map(el => el.textContent || "")
      .join("\n")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
    if (text) sections.push({ heading: currentHeading, content: text });
  }

  body.childNodes.forEach(node => {
    if (node.nodeType === Node.ELEMENT_NODE && node.tagName === "H2") {
      flushSection();
      currentHeading = node.textContent.trim();
      currentNodes = [];
    } else {
      currentNodes.push(node);
    }
  });
  flushSection();

  return sections;
}

// セクション選択行を構築する
function aiRenderSectionRow(articleId) {
  const sectionRow = document.getElementById("ai-section-row");
  // ラベル以外の既存ボタンを削除
  const label = document.getElementById("ai-section-label");
  sectionRow.innerHTML = "";
  sectionRow.appendChild(label);

  if (aiSections.length === 0) {
    // h2なし → セクション行を非表示
    sectionRow.style.display = "none";
    aiCurrentSection = -1;
    return;
  }

  // h2あり → セクション行を表示
  sectionRow.style.display = "flex";

  // 「全文」ボタン
  const allBtn = document.createElement("button");
  allBtn.className = "ai-section-btn" + (aiCurrentSection === -1 ? " active" : "");
  allBtn.textContent = "全文";
  allBtn.dataset.section = "-1";
  sectionRow.appendChild(allBtn);

  // 各セクションボタン
  aiSections.forEach((sec, i) => {
    const btn = document.createElement("button");
    btn.className = "ai-section-btn" + (aiCurrentSection === i ? " active" : "");
    // 見出しが長い場合は省略（CSSのtext-overflowで対応済み）
    btn.textContent = sec.heading;
    btn.title = sec.heading; // ホバーで全文表示
    btn.dataset.section = String(i);
    sectionRow.appendChild(btn);
  });
}

// セクション選択クリックイベント
document.getElementById("ai-section-row").addEventListener("click", e => {
  const btn = e.target.closest(".ai-section-btn");
  if (!btn) return;
  aiCurrentSection = parseInt(btn.dataset.section, 10);
  // アクティブ状態を更新
  document.querySelectorAll(".ai-section-btn").forEach(b => {
    b.classList.toggle("active", parseInt(b.dataset.section, 10) === aiCurrentSection);
  });
});

// 現在選択中のセクションのコンテンツを返す
// セクション未選択(-1)または全文の場合は記事全体のcontentを返す
function aiGetTargetContent(n) {
  if (aiCurrentSection === -1 || aiSections.length === 0) {
    return n.content; // 全文（プレーンテキスト）
  }
  return aiSections[aiCurrentSection].content;
}

// 現在選択中のセクションのタイトルラベルを返す（ログ・ユーザー表示用）
function aiGetSectionLabel() {
  if (aiCurrentSection === -1 || aiSections.length === 0) return null;
  return aiSections[aiCurrentSection].heading;
}

// パネルを開閉するトグル
document.getElementById("ai-panel-toggle").addEventListener("click", () => {
  aiPanelOpen = !aiPanelOpen;
  document.getElementById("ai-panel").classList.toggle("open", aiPanelOpen);
  if (aiPanelOpen) aiScrollHistory();
});

// ショートカットボタン押下 → 対応するmodeで送信
document.getElementById("ai-shortcuts").addEventListener("click", e => {
  const btn = e.target.closest(".ai-shortcut-btn");
  if (!btn) return;
  aiSubmit({ mode: btn.dataset.mode });
});

// 送信ボタン
document.getElementById("ai-send-btn").addEventListener("click", () => {
  const q = document.getElementById("ai-input").value.trim();
  if (q) aiSubmit({ question: q });
});

// Enterキー送信（Shift+Enterは改行）
document.getElementById("ai-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const q = document.getElementById("ai-input").value.trim();
    if (q) aiSubmit({ question: q });
  }
});

// テキストエリアの高さを内容に合わせて自動調整
document.getElementById("ai-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 80) + "px";
});

// 送信処理本体
async function aiSubmit({ mode, question }) {
  if (!openId) return;
  const n = data.newsletters.find(x => x.id === openId);
  if (!n) return;

  const MODE_LABELS = {
    要約:  "この記事を要約してください。",
    論点:  "この記事の論点を整理してください。",
    疑問点: "この記事への疑問点を挙げてください。",
    反論:  "この記事への反論を考えてください。",
    応用:  "この記事を自分の仕事や生活に応用する示唆を教えてください。",
  };

  const userText = mode ? MODE_LABELS[mode] : question;

  // 対象コンテンツを確定（全文 or 選択セクション）
  const targetContent = aiGetTargetContent(n);
  const sectionLabel = aiGetSectionLabel();

  // セクション指定がある場合はtitleに付加してAIに文脈を伝える
  const titleForApi = sectionLabel
    ? n.title + "【セクション：" + sectionLabel + "】"
    : n.title;

  // 入力欄をクリア
  document.getElementById("ai-input").value = "";
  document.getElementById("ai-input").style.height = "auto";

  // 履歴を取得
  const history = aiLoadHistory(openId);

  // ユーザー発言をUIに追加（セクション名を表示）
  const displayText = sectionLabel
    ? "【" + sectionLabel + "】" + userText
    : userText;
  aiAppendBubble("user", displayText);

  // 「考え中…」表示
  const thinkingEl = aiAppendBubble("thinking", "考え中…");

  // 送信ボタンを無効化
  document.getElementById("ai-send-btn").disabled = true;

  try {
    const reply = await aiCallApi({
      mode,
      question: mode ? undefined : question,
      title: titleForApi,
      content: targetContent,
      history,
    });

    thinkingEl.remove();
    aiAppendBubble("assistant", reply);

    // 履歴を更新して保存
    history.push({ role: "user", content: displayText });
    history.push({ role: "assistant", content: reply });
    aiSaveHistory(openId, history);

  } catch (e) {
    thinkingEl.remove();
    aiAppendBubble("error", "エラー: " + e.message);
  } finally {
    document.getElementById("ai-send-btn").disabled = false;
  }
}

// 吹き出しをai-historyに追加してスクロール
function aiAppendBubble(type, text) {
  const el = document.createElement("div");
  el.className = "ai-bubble " + type;
  el.textContent = text;
  document.getElementById("ai-history").appendChild(el);
  aiScrollHistory();
  return el;
}

// 履歴エリアを最下部にスクロール
function aiScrollHistory() {
  const h = document.getElementById("ai-history");
  h.scrollTop = h.scrollHeight;
}

// 記事を開いたときにAIパネルの状態をリセット・履歴を復元
function aiResetPanel(articleId) {
  // パネルは閉じた状態で開始
  aiPanelOpen = false;
  aiCurrentSection = -1;
  document.getElementById("ai-panel").classList.remove("open");

  // 記事のセクションを解析
  const n = data.newsletters.find(x => x.id === articleId);
  aiSections = n ? aiParseSection(n) : [];

  // セクション選択行を構築
  aiRenderSectionRow(articleId);

  // 会話履歴をlocalStorageから復元してUIに反映
  const history = aiLoadHistory(articleId);
  const histEl = document.getElementById("ai-history");
  histEl.innerHTML = "";
  history.forEach(msg => {
    const el = document.createElement("div");
    el.className = "ai-bubble " + msg.role;
    el.textContent = msg.content;
    histEl.appendChild(el);
  });
}

/* ============ GMAIL IMPORT ============ */
function base64UrlDecode(str) {
  str = str.replace(/-/g, "+").replace(/_/g, "/");
  while (str.length % 4) str += "=";
  const binary = atob(str);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}

function extractBody(payload) {
  // returns { html, text } - prefers HTML (for formatting), falls back to plain text
  if (!payload) return { html: null, text: "" };
  let plain = null, html = null;

  function walk(part) {
    if (!part) return;
    if (part.mimeType === "text/plain" && part.body && part.body.data) {
      plain = plain || base64UrlDecode(part.body.data);
    } else if (part.mimeType === "text/html" && part.body && part.body.data) {
      html = html || base64UrlDecode(part.body.data);
    }
    if (part.parts) part.parts.forEach(walk);
  }
  walk(payload);

  if (html) {
    return { html: sanitizeHtml(html), text: htmlToText(html) };
  }
  if (plain) return { html: null, text: plain.trim() };
  return { html: null, text: "" };
}

function htmlToText(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  return (doc.body.textContent || "").replace(/\n{3,}/g, "\n\n").trim();
}

function sanitizeHtml(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  // remove dangerous elements
  doc.querySelectorAll("script, style, iframe, object, embed, link, meta, form, input, button").forEach(el => el.remove());
  // strip dangerous attributes
  doc.querySelectorAll("*").forEach(el => {
    [...el.attributes].forEach(attr => {
      const name = attr.name.toLowerCase();
      if (name.startsWith("on") || name === "style" || name === "id" || name === "class") {
        el.removeAttribute(attr.name);
      }
      if ((name === "href" || name === "src") && /^\s*javascript:/i.test(attr.value)) {
        el.removeAttribute(attr.name);
      }
    });
    // open links in new tab
    if (el.tagName === "A") {
      el.setAttribute("target", "_blank");
      el.setAttribute("rel", "noopener noreferrer");
    }
  });
  return doc.body.innerHTML;
}

function getHeader(headers, name) {
  const h = headers.find(x => x.name.toLowerCase() === name.toLowerCase());
  return h ? h.value : "";
}

async function checkGmail() {
  if (!accessToken) return;
  try {
    document.getElementById("syncStatus").textContent = "新着確認中…";
    const listRes = await driveFetch(
      "https://gmail.googleapis.com/gmail/v1/users/me/messages?q=" + encodeURIComponent(GMAIL_QUERY) + "&maxResults=20"
    );
    const listJson = await listRes.json();
    const messages = listJson.messages || [];
    if (!data.importedIds) data.importedIds = [];

    const newOnes = messages.filter(m => !data.importedIds.includes(m.id));
    if (newOnes.length === 0) {
      document.getElementById("syncStatus").textContent = "同期済み";
      return;
    }

    for (const m of newOnes) {
      const msgRes = await driveFetch(
        "https://gmail.googleapis.com/gmail/v1/users/me/messages/" + m.id + "?format=full"
      );
      const msg = await msgRes.json();
      const subject = getHeader(msg.payload.headers, "Subject") || "(無題)";
      const body = extractBody(msg.payload);
      const text = body.text || "(本文を取得できませんでした)";

      data.newsletters.push({
        id: uid(),
        title: subject,
        content: text,
        html: body.html || null,
        status: "unread",
        favorite: false,
        pos: 0,
        bookmarks: [],
        addedAt: Number(msg.internalDate) || Date.now()
      });
      data.importedIds.push(m.id);
    }

    persist();
    render();
    document.getElementById("syncStatus").textContent = `${newOnes.length}件 新着取り込み済み`;
  } catch (e) {
    console.error(e);
    document.getElementById("syncStatus").textContent = "Gmail取得エラー";
  }
}
